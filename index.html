<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Omni-Panel Interactivo</title>
    <style>
        :root {
            --bg-glass: rgba(30, 30, 30, 0.75);
            --border-glass: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --accent-color: #00adb5;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #141e30, #243b55);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .dashboard-container {
            width: 90%;
            max-width: 1000px;
            background: var(--bg-glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-glass);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .header {
            border-bottom: 1px solid var(--border-glass);
            padding-bottom: 12px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            margin: 0;
            font-size: 1.5rem;
            letter-spacing: 1px;
        }

        .grid-layout {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }

        .card-button {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-glass);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .card-button:hover {
            background: var(--accent-color);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 173, 181, 0.4);
        }

        .input-preview-box {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            border-left: 4px solid var(--accent-color);
        }

        /* Simulación de teclado virtual integrado */
        .keyboard-wrapper {
            margin-top: 20px;
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 8px;
            background: rgba(0, 0, 0, 0.3);
            padding: 12px;
            border-radius: 8px;
        }

        .key {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            padding: 12px 5px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .key:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        .key.wide {
            grid-column: span 2;
            background: rgba(0, 173, 181, 0.3);
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div class="header">
        <h1 id="headline-title">Panel de Control General</h1>
        <span id="hint-status" style="color: #aaaaaa; font-size: 0.9rem;">Listo</span>
    </div>

    <div class="grid-layout">
        <div class="card-button" onclick="changeMode('Teclado Estándar', 'Esperando entrada de texto...')">
            <div style="font-size: 1.8rem; margin-bottom: 8px;">⌨️</div>
            <div>Entrada Estándar</div>
        </div>
        <div class="card-button" onclick="changeMode('Búsqueda Multimedia', 'Introduce palabras clave para filtrar')">
            <div style="font-size: 1.8rem; margin-bottom: 8px;">🔍</div>
            <div>Buscar Videos</div>
        </div>
        <div class="card-button" onclick="changeMode('Configuración Segura', 'Modo de entrada oculta activado')">
            <div style="font-size: 1.8rem; margin-bottom: 8px;">🔒</div>
            <div>Acceso Secreto</div>
        </div>
    </div>

    <div class="input-preview-box">
        <strong id="input-label">Terminal de Entrada:</strong>
        <p id="live-text" style="margin: 8px 0 0 0; font-family: monospace; color: #00adb5; font-size: 1.2rem;">_</p>
    </div>

    <div class="keyboard-wrapper">
        <button class="key" onclick="pressKey('Q')">Q</button>
        <button class="key" onclick="pressKey('W')">W</button>
        <button class="key" onclick="pressKey('E')">E</button>
        <button class="key" onclick="pressKey('R')">R</button>
        <button class="key" onclick="pressKey('T')">T</button>
        <button class="key" onclick="pressKey('Y')">Y</button>
        <button class="key" onclick="pressKey('U')">U</button>
        <button class="key" onclick="pressKey('I')">I</button>
        <button class="key" onclick="pressKey('O')">O</button>
        <button class="key" onclick="pressKey('P')">P</button>
        
        <button class="key" onclick="pressKey('A')">A</button>
        <button class="key" onclick="pressKey('S')">S</button>
        <button class="key" onclick="pressKey('D')">D</button>
        <button class="key" onclick="pressKey('F')">F</button>
        <button class="key" onclick="pressKey('G')">G</button>
        <button class="key" onclick="pressKey('H')">H</button>
        <button class="key" onclick="pressKey('J')">J</button>
        <button class="key" onclick="pressKey('K')">K</button>
        <button class="key" onclick="pressKey('L')">L</button>
        <button class="key" onclick="pressKey('Ñ')">Ñ</button>

        <button class="key wide" onclick="pressKey('SPACE')">Espacio</button>
        <button class="key" onclick="pressKey('Z')">Z</button>
        <button class="key" onclick="pressKey('X')">X</button>
        <button class="key" onclick="pressKey('C')">C</button>
        <button class="key" onclick="pressKey('V')">V</button>
        <button class="key" onclick="pressKey('B')">B</button>
        <button class="key" onclick="pressKey('N')">N</button>
        <button class="key" onclick="pressKey('M')">M</button>
        <button class="key wide" onclick="pressKey('BACK')">Borrar</button>
    </div>
</div>

<script>
    let currentInput = "";
    let isSecret = false;

    function changeMode(title, hint) {
        document.getElementById('headline-title').innerText = title;
        document.getElementById('hint-status').innerText = hint;
        currentInput = "";
        isSecret = title.includes("Secreto");
        updateDisplay();
    }

    function pressKey(key) {
        if (key === 'SPACE') {
            currentInput += " ";
        } else if (key === 'BACK') {
            currentInput = currentInput.slice(0, -1);
        } else {
            currentInput += key;
        }
        updateDisplay();
    }

    function updateDisplay() {
        const displayText = isSecret ? "*".repeat(currentInput.length) : currentInput;
        document.getElementById('live-text').innerText = displayText + "_";
    }
</script>

</body>
</html>
